  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

m */\n    --cream: #F5EEE4;\n    --cream-2: #EFE6D8;\n    --paper: #FFFFFF;\n    --ink: #1F1A15;\n    --ink-2: #3B3228;\n    --ink-3: #6E6357;\n    --ink-4: #9A8F82;\n    --rule: #E6DCCC;\n    --rule-2: #D8CCB9;\n\n    /* status \u2014 muted, never decorative */\n    --sage-bg: #ECF3EC;\n    --sage-fg: #2F6B3F;\n    --sage-ink: #1E4A2B;\n    --sky-bg: #E4EEF6;\n    --sky-fg: #2D6A92;\n    --sky-ink: #1D4867;\n    --amber-bg: #F7ECD4;\n    --amber-fg: #8A5E14;\n    --amber-ink: #5E3F08;\n    --rose-bg: #F5DFD8;\n    --rose-fg: #9C3D2A;\n    --rose-ink: #6E2616;\n\n    --shadow-card: 0 1px 2px rgba(31,26,21,.04), 0 8px 24px -12px rgba(31,26,21,.12);\n    --shadow-lift: 0 2px 4px rgba(31,26,21,.05), 0 20px 40px -16px rgba(31,26,21,.18);\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: 'Open Sans', system-ui, sans-serif;\n    background: var(--cream);\n    color: var(--ink);\n    font-size: 15px;\n    line-height: 1.6;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n  h1,h2,h3,h4,h5,h6,.mono-h { font-family: 'Montserrat', sans-serif; letter-spacing: -0.02em; color: var(--ink); }\n  .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0; }\n  button { font-family: 'Montserrat', sans-serif; }\n  input, textarea, select { font-family: 'Open Sans', sans-serif; }\n\n  /* chrome: top switcher */\n  .screenbar {\n    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);\n    z-index: 1000;\n    background: rgba(31,26,21,.92);\n    backdrop-filter: blur(12px);\n    color: #fff;\n    border-radius: 999px;\n    padding: 6px;\n    display: flex; gap: 2px;\n    font-family: 'Montserrat', sans-serif;\n    font-weight: 600; font-size: 12px;\n    box-shadow: var(--shadow-lift);\n  }\n  .screenbar button {\n    background: transparent; border: 0; color: #EFE6D8;\n    padding: 8px 14px; border-radius: 999px; cursor: pointer;\n    letter-spacing: 0.01em;\n  }\n  .screenbar button:hover { color: #fff; }\n  .screenbar button.active { background: var(--orange); color: #fff; }\n\n  /* Nav shared */\n  .nav {\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 22px 56px;\n    background: transparent;\n  }\n  .brand {\n    display: flex; align-items: center; gap: 10px;\n    font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 22px;\n    letter-spacing: -0.02em; color: var(--ink);\n  }\n  .brand-dot {\n    width: 32px; height: 32px;\n    display: inline-grid; place-items: center;\n    flex: 0 0 32px;\n  }\n  .brand-dot svg { width: 100%; height: 100%; display: block; }\n  .nav-links {\n    display: flex; gap: 30px;\n    font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 14px;\n  }\n  .nav-links a { color: var(--ink-2); text-decoration: none; }\n  .nav-links a:hover { color: var(--orange); }\n  .nav-right { display: flex; gap: 10px; align-items: center; }\n\n  .btn {\n    font-family: 'Montserrat', sans-serif; font-weight: 700;\n    border: 0; cursor: pointer;\n    padding: 11px 18px; border-radius: 999px;\n    font-size: 13px; letter-spacing: 0;\n    display: inline-flex; align-items: center; gap: 8px;\n    transition: transform .08s ease, background .15s ease;\n  }\n  .btn:active { transform: translateY(1px); }\n  .btn-primary { background: var(--orange); color: #fff; }\n  .btn-primary:hover { background: var(--orange-deep); }\n  .btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }\n  .btn-ghost:hover { background: var(--ink); color: #fff; }\n  .btn-gold { background: var(--gold); color: var(--ink); }\n  .btn-blue { background: var(--blue); color: #fff; }\n  .btn-sm { padding: 8px 14px; font-size: 12px; }\n\n  .pill {\n    display: inline-flex; align-items: center; gap: 6px;\n    padding: 5px 11px; border-radius: 999px;\n    font-family: 'Montserrat', sans-serif; font-weight: 700;\n    font-size: 11px; letter-spacing: 0.04em; r: pointer; color: var(--ink-3); font-size: 16px; }\n  .tweaks-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }\n  .tweak-row { display: flex; flex-direction: column; gap: 6px; }\n  .tweak-row label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); font-family: 'Montserrat', sans-serif; font-weight: 700; }\n  .tweak-swatches { display: flex; gap: 8px; }\n  .tweak-swatch {\n    width: 28px; height: 28px; border-radius: 8px; cursor: pointer;\n    border: 2px solid transparent;\n  }\n  .tweak-swatch.on { border-color: var(--ink); }\n  .tweak-seg { display: flex; background: var(--cream); border-radius: 10px; padding: 3px; gap: 3px; }\n  .tweak-seg button {\n    flex: 1; border: 0; background: transparent; padding: 6px 8px; border-radius: 8px; cursor: pointer;\n    font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 11px; color: var(--ink-3);\n  }\n  .tweak-seg button.on { background: var(--ink); color: #fff; }\n\n  /* loading animation for search */\n  .loader {\n    position: fixed; inset: 0; background: rgba(31,26,21,.9); backdrop-filter: blur(8px);\n    z-index: 3000; display: none; place-items: center;\n    color: #fff;\n  }\n  .loader.open { display: grid; }\n  .loader-inner { text-align: center; }\n  .loader-spin {\n    width: 80px; height: 80px; border-radius: 50%;\n    margin: 0 auto 24px;\n    border: 3px solid rgba(255,255,255,.15);\n    border-top-color: var(--orange);\n    animation: spin 0.9s linear infinite;\n  }\n  @keyframes spin { to { transform: rotate(360deg); } }\n  .loader-t { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.015em; margin-bottom: 6px; }\n  .loader-sub { color: #B4A897; font-size: 13px; font-family: 'JetBrains Mono', monospace; }\n\n  @media (prefers-reduced-motion: reduce) {\n    * { animation: none !important; transition: none !important; }\n  }\n\n  @media (max-width: 900px) {\n    .triad { grid-template-c -on during international transfers. Codeine &gt; 10 days' supply and CBD products are controlled regardless of onward destination.</p>\n      </div>\n    </div>\n\n    <div class=\"timeline\">\n      <div class=\"stop ok\">\n        <div class=\"stop-head\">\n          <div>\n            <div class=\"stop-type\">Origin \u00b7 United States</div>\n            <div class=\"stop-city\">New York \u00b7 JFK</div>\n          </div>\n          <div class=\"stop-time\">Tue May 21 \u00b7 22:40 departure</div>\n        </div>\n        <div class=\"stop-body\">\n          <div class=\"mini sage\">\n            <div class=\"mname\">Codeine 30mg</div>\n            <div class=\"mstat\">Rx \u00b7 legal</div>\n          </div>\n          <div class=\"mini sage\">\n            <div class=\"mname\">CBD oil 1500mg</div>\n            <div class=\"mstat\">OTC \u00b7 legal</div>\n          </div>\n          <div class=\"mini sage\">\n            <div class=\"mname\">Sertraline 50mg</div>\n            <div class=\"mstat\">Rx \u00b7 legal</div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"stop danger\">\n        <div class=\"stop-head\">\n          <div>\n            <div class=\"stop-type\">Transit \u00b7 United Arab Emirates \u00b7 3h 10m layover</div>\n            <div class=\"stop-city\">Dubai \u00b7 DXB</div>\n          </div>\n          <div class=\"stop-time\">Wed May 22 \u00b7 19:05 \u2013 22:15</div>\n        </div>\n        <div class=\"stop-body\">\n          <div class=\"mini amber\">\n            <div class=\"mname\">Codeine 30mg</div>\n            <div class=\"mstat\">Permit required</div>\n          </div>\n          <div class=\"mini rose\">\n            <div class=\"mname\">CBD oil 1500mg</div>\n            <div class=\"mstat\">Banned \u00b7 any amount</div>\n          </div>\n          <div class=\"mini sky\">\n            <div class=\"mname\">Sertraline 50mg</div>\n            <div class=\"mstat\">Rx letter advised</div>\n          </div>\n        </div>\n        <div style=\"margin-top:14px;padding:14px;border-radius:12px;background:var(--cream);font-size:13px;\">\n          <b style=\"font-family:'Montserrat';font-weight:800\">Resolution:</b>\n          Apply for MoHAP transit permit for codeine (2 business days), remove all CBD products before departure, and carry a doctor's letter in Arabic or English for the SSRI.\n        </div>\n      </div>\n\n      <div class=\"stop ok\">\n        <div class=\"stop-head\">\n          <div>\n            <div class=\"stop-type\">Destination \u00b7 Thailand \u00b7 12 days</div>\n            <div class=\"stop-city\">Bangkok \u00b7 BKK</div>\n          </div>\n          <div class=\"stop-time\">Thu May 23 \u00b7 08:30 arrival</div>\n        </div>\n        <div class=\"stop-body\">\n          <div class=\"mini sky\">\n            <div class=\"mname\">Codeine 30mg</div>\n            <div class=\"mstat\">Rx \u00b7 declare at customs</div>\n          </div>\n          <div class=\"mini amber\">\n            <div class=\"mname\">CBD oil 1500mg</div>\n            <div class=\"mstat\">&lt; 0.2% THC only</div>\n          </div>\n          <div class=\"mini sage\">\n            <div class=\"mname\">Sertraline 50mg</div>\n            <div class=\"mstat\">Rx \u00b7 legal</div>\n          </div>\n        </div>\n      </div>\n    </div>\n\n    <div style=\"margin-top: 26px; padding: 22px; border-radius: 16px; background: var(--sky-bg); border: 1px solid var(--ice); display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;\">\n      <div style=\"max-width:540px\">\n        <div style=\"font-family:'Montserrat';font-weight:900;font-size:22px;letter-spacing:-0.02em;color:var(--sky-ink);\">Resolve everything in one pass.</div>\n        <div style=\"color:var(--sky-ink);font-size:14px;margin-top:4px\">We'll guide you through the MoHAP permit application and rewrite your pack list for DXB transit. Takes ~9 minutes.</div>\n      </div>\n      <button class=\"btn btn-blue\">Start resolution \u2192</button>\n    </div>\n  </div>\n</main>\n\n\n<!-- ============ SHARE CARD ============ -->\n<main id=\"share\" class=\"screen\" data-screen-label=\"05 Share card\">\n  <nav class=\"nav\">\n    <a class=\"brand\" href=\"#\" onclick=\"window.location.href='/v2';return false\">\n      <span class=\"brand-dot\"><svg viewBox=\"0 0 100 100\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\"><defs><linearGradient id=\"coLogoG\" x1=\"15%\" y1=\"85%\" x2=\"85%\" y2=\"15%\"><stop offset=\"0%\" stop-color=\"#C45327\"></stop><stop offset=\"30%\" stop-color=\"#DE6438\"></stop><stop offset=\"50%\" stop-color=\"#E8A972\"></stop><stop offset=\"70%\" stop-color=\"#BDD9F0\"></stop><stop offset=\"100%\" stop-color=\"#5B9BC5\"></stop></linearGradient></defs><g transform=\"rotate(-35 50 50)\"><rect x=\"10\" y=\"32\" width=\"80\" height=\"36\" rx=\"18\" fill=\"none\" stroke=\"url(#coLogoG)\" stroke-width=\"10\"></rect></g></svg></span>\n      Check<span style=\"opacity:.6;font-weight:700\">Orbit</span>\n    </a>\n    <div class=\"nav-links\">\n      <a href=\"/v2/account\">My trips</a>\n      <a href=\"/v2/account\">Medications</a>\n      <a href=\"/v2/check\">Sources</a>\n    </div>\n    <div class=\"nav-right\">\n      <button class=\"btn btn-ghost btn-sm\" onclick=\"go('result')\">\u2190 Back to result</button>\n    </div>\n  </nav>\n\n  <div class=\"share-wrap\">\n    <aside class=\"share-panel\">\n      <div class=\"breadcrumbs\" style=\"margin-bottom:10px\">\n        <span>Adderall</span><span class=\"sep\">\u2192</span><span class=\"cur\">Japan</span>\n      </div>\n      <h2>Make the risk impossible to ignore.</h2>\n      <p>A shareable card with the verdict, the source, and the deadline \u2014 formatted for the platform you're sending it on.</p>\n\n      <div class=\"tweak-row\">\n        <label>Status to feature</label>\n        <div class=\"tweak-seg\" id=\"shareStatusSeg\">\n          <button class=\"on\" data-status=\"banned\">Banned</button>\n          <button data-status=\"restricted\">Restricted</button>\n          <button data-status=\"prescription\">Rx</button>\n          <button data-status=\"legal\">Legal</button>\n        </div>\n      </div>\n\n      <div class=\"tweak-row\" style=\"margin-top:14px\">\n        <label>Format</label>\n        <div class=\"share-opts\" id=\"shareFmt\">\n          <button class=\"share-opt active\" data-fmt=\"story\">Instagram Story<div class=\"so-sub\">9 : 16 portrait</div></button>\n          <button class=\"share-opt\" data-fmt=\"square\">Square post<div class=\"so-sub\">1 : 1 feed</div></button>\n          <button class=\"share-opt\" data-fmt=\"sms\">Text message<div class=\"so-sub\">Single bubble</div></button>\n          <button class=\"share-opt\" data-fmt=\"pdf\">Printable PDF<div class=\"so-sub\">For prescribers</div></button>\n        </div>\n      </div>\n\n      <div class=\"share-meta\">\n        <div><b style=\"color:var(--ink-2);font-family:'Montserrat';font-weight:700\">Contains:</b> Verdict, medication, route, MHLW citation, verification date, deadline.</div>\n        <div><b style=\"color:var(--ink-2);font-family:'Montserrat';font-weight:700\">Does not include:</b> Your personal name, dosage, or prescriber info.</div>\n      </div>\n\n      <div class=\"cta-row\" style=\"margin-top:22px\">\n        <button class=\"btn btn-primary\">Download card</button>\n        <button class=\"btn btn-ghost\">Copy link</button>\n      </div>\n    </aside>\n\n    <div class=\"share-canvas-wrap\">\n      <div class=\"share-card\" id=\"shareCard\">\n        <div class=\"sc-brand\">\n          <span class=\"brand-dot\"><svg viewBox=\"0 0 100 100\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\"><defs><linearGradient id=\"coLogoG\" x1=\"15%\" y1=\"85%\" x2=\"85%\" y2=\"15%\"><stop offset=\"0%\" stop-color=\"#C45327\"></stop><stop offset=\"30%\" stop-color=\"#DE6438\"></stop><stop offset=\"50%\" stop-color=\"#E8A972\"></stop><stop offset=\"70%\" stop-color=\"#BDD9F0\"></stop><stop offset=\"100%\" stop-color=\"#5B9BC5\"></stop></linearGradient></defs><g transform=\"rotate(-35 50 50)\"><rect x=\"10\" y=\"32\" width=\"80\" height=\"36\" rx=\"18\" fill=\"none\" stroke=\"url(#coLogoG)\" stroke-width=\"10\"></rect></g></svg></span>\n          <span class=\"b-name\">CheckOrbit</span>\n          <span style=\"margin-left:auto;font-family:'JetBrains Mono';font-size:10px;color:var(--ink-3)\">VERIFIED \u00b7 APR 11 '26</span>\n        </div>\n\n        <div class=\"sc-route\" id=\"scRoute\">USA \u00b7 JAPAN \u00b7 14 DAYS</div>\n        <div class=\"sc-med\" id=\"scMed\">Adderall 20mg</div>\n\n        <div class=\"sc-verdict banned\" id=\"scVerdict\">\n          <div class=\"sc-label\" id=\"scLabel\">Banned. Do not carry.</div>\n          <div class=\"sc-sub\" id=\"scSub\">Amphetamine-based stimulants are prohibited under Japan's Stimulants Control Act. No tourist permit exists.</div>\n        </div>\n\n        <div class=\"sc-facts\" id=\"scFacts\">\n          <div class=\"sc-fact\"><div class=\"sf-num\">0</div><div class=\"sf-lbl\">Tablets allowed</div></div>\n          <div class=\"sc-fact\"><div class=\"sf-num\">N/A</div><div class=\"sf-lbl\">Permit</div></div>\n          <div class=\"sc-fact\"><div class=\"sf-num\">Criminal</div><div class=\"sf-lbl\">Penalty</div></div>\n          <div class=\"sc-fact\"><div class=\"sf-num\">Apr 25</div><div class=\"sf-lbl\">Act by</div></div>\n        </div>\n\n        <div class=\"sc-src\">\n          <b>Source:</b> Ministry of Health, Labour and Welfare (MHLW) \u00b7 Stimulants Control Act No. 252 of 1951, 2024 revision. Verified by CheckOrbit Apr 11, 2026.\n        </div>\n      </div>\n    </div>\n  </div>\n</main>\n\n\n<!-- Loading overlay -->\n<div class=\"loader\" id=\"loader\">\n  <div class=\"loader-inner\">\n    <div class=\"loader-spin\"></div>\n    <div class=\"loader-t\">Checking against 3 government sources\u2026</div>\n    <div class=\"loader-sub\" id=\"loaderSub\">MHLW 1951.14 \u00b7 cross-ref compound tree \u00b7 verifying</div>\n  </div>\n</div>\n\n\n<!-- Tweaks -->\n<div class=\"tweaks\" id=\"tweaks\">\n  <div class=\"tweaks-h\">\n    <h4>Tweaks</h4>\n    <button onclick=\"closeTweaks()\">\u00d7</button>\n  </div>\n  <div class=\"tweaks-body\">\n    <div class=\"tweak-row\">\n      <label>Primary</label>\n      <div class=\"tweak-swatches\" id=\"tkPrimary\">\n        <div class=\"tweak-swatch on\" data-color=\"#DE6438\" style=\"background:#DE6438\"></div>\n        <div class=\"tweak-swatch\" data-color=\"#C94F2A\" style=\"background:#C94F2A\"></div>\n        <div class=\"tweak-swatch\" data-color=\"#D57A2A\" style=\"background:#D57A2A\"></div>\n        <div class=\"tweak-swatch\" data-color=\"#B7542B\" style=\"background:#B7542B\"></div>\n      </div>\n    </div>\n    <div class=\"tweak-row\">\n      <label>Background</label>\n      <div class=\"tweak-seg\" id=\"tkBg\">\n        <button class=\"on\" data-bg=\"cream\">Cream</button>\n        <button data-bg=\"mist\">Mist</button>\n        <button data-bg=\"paper\">Paper</button>\n      </div>\n    </div>\n    <div class=\"tweak-row\">\n      <label>Headline size</label>\n      <div class=\"tweak-seg\" id=\"tkScale\">\n        <button data-scale=\"0.9\">\u2013</button>\n        <button class=\"on\" data-scale=\"1\">Default</button>\n        <button data-scale=\"1.12\">+</button>\n      </div>\n    </div>\n    <div class=\"tweak-row\">\n      <label>Hero density</label>\n      <div class=\"tweak-seg\" id=\"tkFloat\">\n        <button class=\"on\" data-float=\"on\">Floaters</button>\n        <button data-float=\"off\">Clean</button>\n      </div>\n    </div>\n  </div>\n</div>\n\n\n<script>\n  const TWEAKS = /*EDITMODE-BEGIN*/{\n    \"primary\": \"#C94F2A\",\n    \"bg\": \"cream\",\n    \"scale\": 0.9,\n    \"floaters\": \"on\"\n  }/*EDITMODE-END*/;\n\n  /* ---------- Screens ---------- */\n  function go(id) {\n    document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === id));\n    document.querySelectorAll('#screenbar button').forEach(b => b.classList.toggle('active', b.dataset.screen === id));\n    window.scrollTo({ top: 0, behavior: 'instant' });\n    try { localStorage.setItem('co_screen', id); } catch(e){}\n    return false;\n  }\n  document.getElementById('screenbar').addEventListener('click', e => {\n    if (e.target.tagName === 'BUTTON') go(e.target.dataset.screen);\n  });\n\n  /* restore screen */\n  try {\n    const s = localStorage.getItem('co_screen');\n    if (s) go(s);\n  } catch(e){}\n\n  /* ---------- Hero search typeahead ---------- */\n  function wireField(inputId, suggestId, fieldId) {\n    const input = document.getElementById(inputId);\n    const sug = document.getElementById(suggestId);\n    const field = document.getElementById(fieldId);\n    input.addEventListener('focus', () => sug.classList.add('open'));\n    input.addEventListener('input', () => {\n      field.classList.toggle('dirty', !!input.value);\n      sug.classList.add('open');\n    });\n    input.addEventListener('blur', () => setTimeout(() => sug.classList.remove('open'), 150));\n    sug.querySelectorAll('.suggest-item').forEach(it => {\n      it.addEventListener('mousedown', (e) => {\n        e.preventDefault();\n        input.value = it.dataset.med || it.dataset.dest || it.querySelector('.si-name').textContent;\n        field.classList.add('dirty');\n        sug.classList.remove('open');\n      });\n    });\n  }\n  wireField('medInput', 'medSuggest', 'fieldMed');\n  wireField('destInput', 'destSuggest', 'fieldDest');\n\n  function runSearch() {\n    const med = document.getElementById('medInput').value.trim() || 'Adderall 20mg';\n    const dest = document.getElementById('destInput').value.trim() || 'Japan';\n    const loader = document.getElementById('loader');\n    const sub = document.getElementById('loaderSub');\n    loader.classList.add('open');\n    const steps = [\n      'Parsing compound tree \u00b7 ' + med,\n      'Cross-referencing ' + dest + ' ministry of health',\n      'Verifying source hash \u00b7 MHLW 1951.14',\n      'Assembling answer'\n    ];\n    let i = 0;\n    sub.textContent = steps[0];\n    const t = setInterval(() => {\n      i++;\n      if (i >= steps.length) { clearInterval(t); return; }\n      sub.textContent = steps[i];\n    }, 450);\n    setTimeout(() => {\n      clearInterval(t);\n      loader.classList.remove('open');\n      window.location.href = '/v2/check';\n    }, 1900);\n  }\n\n  /* allow Enter in either field */\n  ['medInput','destInput'].forEach(id => {\n    document.getElementById(id).addEventListener('keydown', e => {\n      if (e.key === 'Enter') runSearch();\n    });\n  });\n\n  /* ---------- Share card interactive ---------- */\n  const scStates = {\n    banned:       { klass:'banned',       label:'Banned. Do not carry.', sub:'Amphetamine-based stimulants are prohibited under Japan\\'s Stimulants Control Act. No tourist permit exists.', facts:[['0','Tablets allowed'],['N/A','Permit'],['Criminal','Penalty'],['Apr 25','Act by']] },\n    restricted:   { klass:'restricted',   label:'Restricted \u2014 permit required.', sub:'Codeine is controlled in Japan. Supply over 10 days requires a Yakkan Shoumei import certificate.', facts:[['42','Max tablets'],['Yakkan','Permit'],['14 days','Lead time'],['May 06','File by']] },\n    prescription: { klass:'prescription', label:'Prescription-only.', sub:'SSRIs are legal with a valid prescription. Carry in original pharmacy-labeled bottle; a doctor\\'s letter is recommended.', facts:[['30','Max tablets'],['None','Permit'],['N/A','Lead time'],['\u2014','Act by']] },\n    legal:        { klass:'legal',        label:'Legal. Pack as you normally would.', sub:'OTC in Japan. Bring up to a 2-month personal supply without declaration.', facts:[['120','Max tablets'],['None','Permit'],['N/A','Lead time'],['\u2014','Act by']] }\n  };\n\n  document.getElementById('shareStatusSeg').addEventListener('click', (e) => {\n    const b = e.target.closest('button');\n    if (!b) return;\n    document.querySelectorAll('#shareStatusSeg button').forEach(x => x.classList.remove('on'));\n    b.classList.add('on');\n    const s = scStates[b.dataset.status];\n    const v = document.getElementById('scVerdict');\n    v.className = 'sc-verdict ' + s.klass;\n    document.getElementById('scLabel').textContent = s.label;\n    document.getElementById('scSub').textContent = s.sub;\n    const facts = document.getElementById('scFacts');\n    facts.innerHTML = s.facts.map(f => `<div class=\"sc-fact\"><div class=\"sf-num\">${f[0]}</div><div class=\"sf-lbl\">${f[1]}</div></div>`).join('');\n  });\n\n  document.getElementById('shareFmt').addEventListener('click', (e) => {\n    const b = e.target.closest('.share-opt');\n    if (!b) return;\n    document.querySelectorAll('#shareFmt .share-opt').forEach(x => x.classList.remove('active'));\n    b.classList.add('active');\n    const card = document.getElementById('shareCard');\n    const fmt = b.dataset.fmt;\n    card.style.width = fmt === 'story' ? '380px'\n                     : fmt === 'square' ? '440px'\n                     : fmt === 'sms' ? '300px'\n                     : '460px';\n    card.style.aspectRatio = fmt === 'story' ? '9 / 16'\n                     : fmt === 'square' ? '1 / 1'\n                     : 'auto';\n  });\n\n  /* ---------- Tweaks ---------- */\n  let tweakMode = false;\n  window.addEventListener('message', (ev) => {\n    const d = ev.data || {};\n    if (d.type === '__activate_edit_mode') openTweaks();\n    if (d.type === '__deactivate_edit_mode') closeTweaks();\n  });\n\n  function openTweaks() { tweakMode = true; document.getElementById('tweaks').classList.add('open'); }\n  function closeTweaks() { tweakMode = false; document.getElementById('tweaks').classList.remove('open'); }\n\n  function applyTweaks() {\n    document.documentElement.style.setProperty('--orange', TWEAKS.primary);\n    // derive deep\n    document.documentElement.style.setProperty('--orange-deep', shade(TWEAKS.primary, -0.15));\n    const bgs = { cream: '#F5EEE4', mist: '#EDEEEA', paper: '#FAF8F4' };\n    document.body.style.background = bgs[TWEAKS.bg] || bgs.cream;\n    document.documentElement.style.setProperty('--cream', bgs[TWEAKS.bg] || bgs.cream);\n    document.querySelectorAll('h1.hero-title, .stack-head h1, .itin-head h1, .result-title').forEach(h => {\n      h.style.fontSize = '';\n      const base = parseFloat(getComputedStyle(h).fontSize);\n      h.style.fontSize = (base * TWEAKS.scale) + 'px';\n    });\n    document.querySelector('.floaters').style.display = TWEAKS.floaters === 'off' ? 'none' : '';\n  }\n  function shade(hex, pct) {\n    const c = hex.replace('#','');\n    const n = parseInt(c, 16);\n    let r = (n >> 16) & 0xff, g = (n >> 8) & 0xff, b = n & 0xff;\n    r = Math.max(0, Math.min(255, Math.round(r + 255*pct)));\n    g = Math.max(0, Math.min(255, Math.round(g + 255*pct)));\n    b = Math.max(0, Math.min(255, Math.round(b + 255*pct)));\n    return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');\n  }\n\n  document.getElementById('tkPrimary').addEventListener('click', (e) => {\n    const s = e.target.closest('.tweak-swatch'); if (!s) return;\n    document.querySelectorAll('#tkPrimary .tweak-swatch').forEach(x => x.classList.remove('on'));\n    s.classList.add('on');\n    TWEAKS.primary = s.dataset.color; persist();\n  });\n  document.getElementById('tkBg').addEventListener('click', (e) => {\n    const b = e.target.closest('button'); if (!b) return;\n    document.querySelectorAll('#tkBg button').forEach(x => x.classList.remove('on'));\n    b.classList.add('on');\n    TWEAKS.bg = b.dataset.bg; persist();\n  });\n  document.getElementById('tkScale').addEventListener('click', (e) => {\n    const b = e.target.closest('button'); if (!b) return;\n    document.querySelectorAll('#tkScale button').forEach(x => x.classList.remove('on'));\n    b.classList.add('on');\n    TWEAKS.scale = parseFloat(b.dataset.scale); persist();\n  });\n  document.getElementById('tkFloat').addEventListener('click', (e) => {\n    const b = e.target.closest('button'); if (!b) return;\n    document.querySelectorAll('#tkFloat button').forEach(x => x.classList.remove('on'));\n    b.classList.add('on');\n    TWEAKS.floaters = b.dataset.float; persist();\n  });\n  function persist() {\n    applyTweaks();\n    try {\n      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: TWEAKS }, '*');\n    } catch(e){}\n  }\n  applyTweaks();\n\n  // announce tweaks available AFTER listener is attached\n  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e){}\n</script>\n\n\n</body></html>"
  </script>
